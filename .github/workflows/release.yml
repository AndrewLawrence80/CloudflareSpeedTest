name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build for multiple platforms
        env:
          CGO_ENABLED: 0
        run: |
          # Build for Linux amd64 (statically linked)
          GOOS=linux GOARCH=amd64 go build -o CloudflareSpeedTest-linux-amd64 -ldflags="-s -w -extldflags '-static'" -trimpath .
          tar -czf CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz CloudflareSpeedTest-linux-amd64 cloudflare_ip_range.txt .env.example

          # Build for Linux arm64 (statically linked)
          GOOS=linux GOARCH=arm64 go build -o CloudflareSpeedTest-linux-arm64 -ldflags="-s -w -extldflags '-static'" -trimpath .
          tar -czf CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-linux-arm64.tar.gz CloudflareSpeedTest-linux-arm64 cloudflare_ip_range.txt .env.example

          # Build for Windows amd64 (statically linked)
          GOOS=windows GOARCH=amd64 go build -o CloudflareSpeedTest-windows-amd64.exe -ldflags="-s -w" -trimpath .
          zip CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip CloudflareSpeedTest-windows-amd64.exe cloudflare_ip_range.txt .env.example

          # Build for Windows arm64 (statically linked)
          GOOS=windows GOARCH=arm64 go build -o CloudflareSpeedTest-windows-arm64.exe -ldflags="-s -w" -trimpath .
          zip CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-windows-arm64.zip CloudflareSpeedTest-windows-arm64.exe cloudflare_ip_range.txt .env.example

          # Build for macOS amd64 (Intel)
          GOOS=darwin GOARCH=amd64 go build -o CloudflareSpeedTest-darwin-amd64 -ldflags="-s -w" -trimpath .
          tar -czf CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-darwin-amd64.tar.gz CloudflareSpeedTest-darwin-amd64 cloudflare_ip_range.txt .env.example

          # Build for macOS arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -o CloudflareSpeedTest-darwin-arm64 -ldflags="-s -w" -trimpath .
          tar -czf CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-darwin-arm64.tar.gz CloudflareSpeedTest-darwin-arm64 cloudflare_ip_range.txt .env.example

      - name: Create source tarball
        run: |
          git archive --format=tar.gz --prefix=CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}/ HEAD > CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-src.tar.gz

      - name: Generate checksums
        run: |
          sha256sum CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-*.tar.gz CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-*.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-linux-amd64.tar.gz
            CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-linux-arm64.tar.gz
            CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-windows-amd64.zip
            CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-windows-arm64.zip
            CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-darwin-amd64.tar.gz
            CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-darwin-arm64.tar.gz
            CloudflareSpeedTest-${{ steps.get_version.outputs.VERSION }}-src.tar.gz
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
